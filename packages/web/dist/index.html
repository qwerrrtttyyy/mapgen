<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MapGen Studio — Procedural World Generator</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
  <script type="module" crossorigin src="/assets/index-CuUvFYcF.js"></script>
</head>
<body>

<div id="app">
  <canvas id="glCanvas"></canvas>
  <canvas id="overlayCanvas"></canvas>

  <div id="size-handle" title="拖拽调整地图尺寸">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M13 2L2 13M13 7L7 13M13 12L8 13H13V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div id="topbar">
    <div class="tb-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="5" fill="url(#lg)"/>
          <path d="M4 14c2-4 4-8 7-8s3 4 7 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <circle cx="15" cy="7" r="1.5" fill="#fff"/>
          <defs><linearGradient id="lg" x1="0" y1="0" x2="22" y2="22"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
        </svg>
        <span class="logo-text">MapGen <em>Studio</em></span>
      </div>
      <div class="tb-sep"></div>
      <button class="tb-btn tb-btn-primary" id="btn-generate" title="生成地图 (Space)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7a5 5 0 015-5c1.5 0 2.8.6 3.7 1.7M12 7a5 5 0 01-5 5c-1.5 0-2.8-.6-3.7-1.7M6 7l2-2 2 2-2 2-2-2z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        生成
      </button>
      <button class="tb-btn" id="btn-random" title="随机种子并生成 (R)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10l3-3 2 2 4-5M10 4h2v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        随机
      </button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-undo" title="撤销 (Ctrl+Z)" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 6h5a3 3 0 010 6H5M3 6l2-2M3 6l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tb-btn" id="btn-redo" title="重做 (Ctrl+Y)" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11 6H6a3 3 0 000 6h3M11 6L9 4M11 6L9 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-export" title="导出 PNG">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        导出
      </button>
    </div>
    <div class="tb-center">
      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">就绪</span>
      </div>
    </div>
    <div class="tb-right">
      <button class="tb-btn tb-btn-icon" id="btn-panel-toggle" title="切换面板 (Tab)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M9 3v8" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <div id="panel" class="panel-open">
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="world">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M2 7h10M7 2c1.5 1.5 1.5 8.5 0 10M7 2c-1.5 1.5-1.5 8.5 0 10" stroke="currentColor" stroke-width="1.1"/></svg>
        <span>世界</span>
      </button>
      <button class="panel-tab" data-tab="terrain">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 12l4-7 3 4 2-2 3 5H1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        <span>地形</span>
      </button>
      <button class="panel-tab" data-tab="climate">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 9a3 3 0 112-5.5A4 4 0 0112 7a2.5 2.5 0 01-2.5 2H4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        <span>气候</span>
      </button>
      <button class="panel-tab" data-tab="water">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2s3.5 4 3.5 7a3.5 3.5 0 11-7 0C3.5 6 7 2 7 2z" stroke="currentColor" stroke-width="1.2"/></svg>
        <span>水文</span>
      </button>
      <button class="panel-tab" data-tab="render">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.1"/></svg>
        <span>渲染</span>
      </button>
    </div>

    <div class="panel-body">
      <div class="panel-section active" data-section="world">
        <div class="ps-group">
          <div class="ps-label">世界预设</div>
          <div class="preset-grid" id="preset-grid"></div>
        </div>

        <div class="ps-group">
          <div class="ps-label">种子</div>
          <div class="input-row">
            <input type="text" id="seedStr" class="f-input" value="12345" placeholder="输入种子...">
            <button class="f-btn f-btn-sm" id="btn-random-seed" title="随机种子">
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 10l3-3 2 2 4-5M10 4h2v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <div class="ps-group">
          <div class="ps-label">地图尺寸</div>
          <div class="size-row">
            <div class="size-field">
              <label>宽</label>
              <input type="number" id="mapWidth" class="f-input f-input-num" value="512" min="64" max="2048" step="32">
            </div>
            <span class="size-x">×</span>
            <div class="size-field">
              <label>高</label>
              <input type="number" id="mapHeight" class="f-input f-input-num" value="512" min="64" max="2048" step="32">
            </div>
          </div>
          <div class="size-presets">
            <button class="sz-btn" data-w="256" data-h="256">256²</button>
            <button class="sz-btn active" data-w="512" data-h="512">512²</button>
            <button class="sz-btn" data-w="768" data-h="512">768×512</button>
            <button class="sz-btn" data-w="1024" data-h="1024">1024²</button>
          </div>
          <div class="size-info" id="size-info">512×512 · 262,144 像素</div>
        </div>

        <div class="ps-group">
          <div class="ps-label">噪声引擎</div>
          <div class="dual-row">
            <select id="noiseType" class="f-select">
              <option value="perlin">Perlin</option>
              <option value="simplex">Simplex</option>
              <option value="value">Value</option>
              <option value="worley">Worley</option>
            </select>
            <select id="fbmType" class="f-select">
              <option value="standard">标准 FBM</option>
              <option value="ridged">山脊</option>
              <option value="billowy">丘陵</option>
              <option value="warped">扭曲</option>
            </select>
          </div>
          <div class="slider-row">
            <label>八度 <span class="sv" id="octaves-val">5</span></label>
            <input type="range" id="octaves" min="1" max="8" value="5">
          </div>
          <div class="slider-row">
            <label>细节层 <span class="sv" id="lacunarity-val">2.0</span></label>
            <input type="range" id="lacunarity" min="1.5" max="3.0" step="0.1" value="2.0">
          </div>
          <div class="slider-row">
            <label>衰减 <span class="sv" id="persistence-val">0.5</span></label>
            <input type="range" id="persistence" min="0.1" max="0.9" step="0.05" value="0.5">
          </div>
        </div>

        <div class="ps-group">
          <div class="ps-label">构造</div>
          <div class="slider-row">
            <label>板块数 <span class="sv" id="plateCount-val">8</span></label>
            <input type="range" id="plateCount" min="2" max="24" value="8">
          </div>
          <div class="slider-row">
            <label>陆地比例 <span class="sv" id="landmass-val">40%</span></label>
            <input type="range" id="landmass" min="10" max="90" value="40">
          </div>
          <div class="slider-row">
            <label>山脉褶皱 <span class="sv" id="mountainFold-val">0.30</span></label>
            <input type="range" id="mountainFold" min="0" max="100" value="30">
          </div>
          <div class="slider-row">
            <label>海岸细节 <span class="sv" id="coastDetail-val">0.50</span></label>
            <input type="range" id="coastDetail" min="0" max="100" value="50">
          </div>
        </div>

        <div class="ps-group">
          <div class="ps-label">世界模拟</div>
          <label class="check-row"><input type="checkbox" id="enableOceanCurrents" checked><span>洋流系统</span></label>
          <label class="check-row"><input type="checkbox" id="enableIceSheet" checked><span>动态冰盖 & 冰川侵蚀</span></label>
          <label class="check-row"><input type="checkbox" id="enableMonsoon" checked><span>季风环流</span></label>
          <label class="check-row"><input type="checkbox" id="enableContinentality" checked><span>大陆度修正</span></label>
          <label class="check-row"><input type="checkbox" id="enableHadleyEnhancement" checked><span>Hadley 环流强化</span></label>
        </div>
      </div>

      <div class="panel-section" data-section="terrain">
        <div class="ps-group">
          <div class="ps-label">地形基础</div>
          <div class="slider-row">
            <label>海平面 <span class="sv" id="seaLevel-val">0.45</span></label>
            <input type="range" id="seaLevel" min="10" max="80" value="45">
          </div>
          <div class="slider-row">
            <label>侵蚀强度 <span class="sv" id="erosionStrength-val">1.0</span></label>
            <input type="range" id="erosionStrength" min="0" max="300" value="100">
          </div>
          <div class="slider-row">
            <label>侵蚀迭代 <span class="sv" id="erosionIterations-val">50</span></label>
            <input type="range" id="erosionIterations" min="0" max="200" value="50">
          </div>
          <div class="slider-row">
            <label>湖泊密度 <span class="sv" id="lakeDensity-val">0.02</span></label>
            <input type="range" id="lakeDensity" min="0" max="100" value="20">
          </div>
        </div>
      </div>

      <div class="panel-section" data-section="climate">
        <div class="ps-group">
          <div class="ps-label">气候参数</div>
          <div class="slider-row">
            <label>温度偏移 <span class="sv" id="tempOffset-val">0</span></label>
            <input type="range" id="tempOffset" min="-50" max="50" value="0">
          </div>
          <div class="slider-row">
            <label>雪线高度 <span class="sv" id="snowLine-val">0.50</span></label>
            <input type="range" id="snowLine" min="10" max="100" value="50">
          </div>
          <div class="slider-row">
            <label>降雨强度 <span class="sv" id="rainStrength-val">1.0</span></label>
            <input type="range" id="rainStrength" min="0" max="200" value="100">
          </div>
        </div>
        <div class="ps-group">
          <div class="ps-label">风向</div>
          <div class="wind-pad">
            <div class="wind-visual" id="wind-visual">
              <div class="wind-arrow" id="wind-arrow"></div>
            </div>
            <div class="wind-sliders">
              <div class="slider-row">
                <label>X <span class="sv" id="windDirX-val">1.0</span></label>
                <input type="range" id="windDirX" min="-100" max="100" value="100">
              </div>
              <div class="slider-row">
                <label>Y <span class="sv" id="windDirY-val">0</span></label>
                <input type="range" id="windDirY" min="-100" max="100" value="0">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel-section" data-section="water">
        <div class="ps-group">
          <div class="ps-label">河流</div>
          <div class="slider-row">
            <label>河流数量 <span class="sv" id="riverCount-val">20</span></label>
            <input type="range" id="riverCount" min="0" max="100" value="20">
          </div>
        </div>
      </div>

      <div class="panel-section" data-section="render">
        <div class="ps-group">
          <div class="ps-label">渲染风格</div>
          <select id="style" class="f-select">
            <optgroup label="综合渲染">
              <option value="0">地形</option>
              <option value="1">板块</option>
              <option value="2">羊皮纸</option>
              <option value="3">卫星</option>
              <option value="4">低多边形</option>
              <option value="5">地形详情</option>
              <option value="6">生物群落</option>
              <option value="7">等高线</option>
              <option value="8">浮雕</option>
              <option value="9">Azgaar</option>
            </optgroup>
            <optgroup label="单图层观察">
              <option value="10">高程图</option>
              <option value="11">坡度图</option>
              <option value="12">湿度图</option>
              <option value="13">温度图</option>
              <option value="14">板块图</option>
              <option value="15">生物群系图</option>
              <option value="16">山脊图</option>
              <option value="17">洋流图</option>
              <option value="18">冰盖图</option>
            </optgroup>
          </select>
        </div>

        <div class="ps-group">
          <div class="ps-label">叠层</div>
          <label class="check-row"><input type="checkbox" id="showBoundaries" checked><span>板块边界</span></label>
          <div class="slider-row indent" id="boundary-width-row">
            <label>宽度 <span class="sv" id="boundaryWidth-val">0.8</span></label>
            <input type="range" id="boundaryWidth" min="1" max="20" value="8">
          </div>
          <label class="check-row"><input type="checkbox" id="showRivers" checked><span>河流</span></label>
          <label class="check-row"><input type="checkbox" id="showContours"><span>等高线</span></label>
          <label class="check-row"><input type="checkbox" id="showTerrain" checked><span>地形底图</span></label>
          <label class="check-row"><input type="checkbox" id="showSelection" checked><span>选中高亮</span></label>
          <label class="check-row"><input type="checkbox" id="showClimate"><span>气候分区</span></label>
          <label class="check-row"><input type="checkbox" id="showGrid"><span>网格</span></label>
        </div>

        <div class="ps-group">
          <div class="ps-label">光影</div>
          <div class="slider-row">
            <label>光照角度 <span class="sv" id="lightAngle-val">0.80</span></label>
            <input type="range" id="lightAngle" min="0" max="628" value="80">
          </div>
          <label class="check-row"><input type="checkbox" id="pointLightEnabled"><span>点光源</span></label>
          <label class="check-row"><input type="checkbox" id="glowEnabled"><span>辉光效果</span></label>
        </div>

        <div class="ps-group">
          <div class="ps-label">激光指针 (L)</div>
          <label class="check-row"><input type="checkbox" id="laserActive"><span>启用激光</span></label>
          <label class="check-row"><input type="checkbox" id="laserSelection" checked><span>激光选区模式</span></label>
          <div class="slider-row indent">
            <label>宽度 <span class="sv" id="laserWidth-val">0.003</span></label>
            <input type="range" id="laserWidth" min="1" max="10" value="3">
          </div>
          <label class="check-row"><input type="checkbox" id="cursorActive"><span>光标跟随</span></label>
          <label class="check-row"><input type="checkbox" id="trailEnabled"><span>鼠标轨迹</span></label>
        </div>
      </div>
    </div>
  </div>

  <div id="bottombar">
    <div class="bb-left">
      <div class="minimap-wrap">
        <canvas id="minimap" width="96" height="96"></canvas>
      </div>
      <div class="world-info">
        <div class="wi-row">
          <span class="wi-key">种子</span>
          <span class="wi-val mono" id="wi-seed">—</span>
        </div>
        <div class="wi-row">
          <span class="wi-key">尺寸</span>
          <span class="wi-val mono" id="wi-size">—</span>
        </div>
        <div class="wi-row" id="wi-stats" style="display:none">
          <span class="wi-key">统计</span>
          <span class="wi-val mono" id="wi-stats-val">—</span>
        </div>
      </div>
    </div>

    <div class="bb-center">
      <div class="edit-tools">
        <button class="et-btn active" data-tool="idle" title="查看 (V)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l3-3 2 2 4-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 3h2v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>查看</span>
        </button>
        <button class="et-btn" data-tool="brush" title="画笔 (B)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
          <span>画笔</span>
        </button>
        <button class="et-btn" data-tool="vector-line" title="山脉线 (M)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 13l4-7 3 4 2-3 3 6H1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
          <span>山脉</span>
        </button>
        <button class="et-btn" data-tool="vector-poly" title="地形面 (P)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2l6 4v6l-6 2-6-2V6l6-4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
          <span>地形</span>
        </button>
        <button class="et-btn" data-tool="drag-plate" title="拖拽板块 (D)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M3 8h10M8 3v10" stroke="currentColor" stroke-width="1.1"/></svg>
          <span>板块</span>
        </button>
        <button class="et-btn" data-tool="annotate" title="标注 (A)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 12V4h5a2 2 0 010 4H4M4 8h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span>标注</span>
        </button>
        <div class="et-sep"></div>
        <div class="brush-ctrls" id="brush-ctrls">
          <select id="brushKind" class="mini-select">
            <option value="raise">抬升</option>
            <option value="lower">沉降</option>
            <option value="land">成陆</option>
            <option value="sea">成海</option>
            <option value="plate-paint">涂板块</option>
          </select>
          <div class="mini-slider">
            <span class="ms-label">半径</span>
            <input type="range" id="brushRadius" min="2" max="80" value="14">
            <span class="ms-val" id="brushRadius-val">14</span>
          </div>
          <div class="mini-slider">
            <span class="ms-label">强度</span>
            <input type="range" id="brushStrength" min="5" max="100" value="30">
            <span class="ms-val" id="brushStrength-val">0.3</span>
          </div>
        </div>
        <button class="et-btn et-btn-sm" id="btn-toggle-names" title="切换名称显示">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M4 6h6M4 8h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button class="et-btn et-btn-sm" id="btn-clear-selection" title="清空选择 (Esc)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="bb-right">
      <div class="style-dots" id="style-dots"></div>
      <div class="zoom-ctrl">
        <button class="z-btn" id="btn-zoom-out">−</button>
        <span class="z-val" id="zoom-val">100%</span>
        <button class="z-btn" id="btn-zoom-in">+</button>
        <button class="z-btn z-btn-reset" id="btn-zoom-reset" title="重置视图">⟳</button>
      </div>
    </div>
  </div>

  <div id="progress-overlay">
    <div class="prog-box">
      <div class="prog-phase" id="prog-phase">初始化...</div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
  </div>

  <div id="checkpoint-popover">
    <div class="cp-header">
      <span>检查点</span>
      <button class="f-btn f-btn-sm" id="btn-save-cp">+ 保存</button>
    </div>
    <div class="cp-list" id="cp-list"></div>
  </div>
</div>

</body>
</html>
