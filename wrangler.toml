# Cloudflare Workers 配置 — 纯静态资源托管
#
# 部署模型：Workers Static Assets（无需 Worker 入口脚本）
# - 所有静态资源（HTML/CSS/JS/shaders/图标）由 Cloudflare 全球 CDN 直接分发
# - SPA 模式：未匹配路径自动回退到 index.html，支持客户端路由
# - 免费 100k 请求/天，足够 demo 使用
#
# 部署方式：
# 1. 本地：bun run deploy:cloudflare（需要先 wrangler login）
# 2. CI：GitHub Actions 自动部署（见 .github/workflows/deploy-cloudflare.yml）
#
# 首次部署后会获得 https://mapgen.<your-subdomain>.workers.dev 地址。
# 可在 Cloudflare Dashboard → Workers & Pages → mapgen → Settings → Domains 绑定自定义域名。

name = "mapgen"
compatibility_date = "2025-01-01"

# 静态资源目录（vite build 产物）
[assets]
directory = "./packages/web/dist"
# SPA 模式：未匹配的路径回退到 index.html（支持客户端路由）
not_found_handling = "single-page-application"
