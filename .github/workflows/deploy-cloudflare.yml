name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同时只跑一个部署，避免并发冲突
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-cloudflare-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Build web for Cloudflare
        # Cloudflare Workers 默认在根路径提供服务（https://mapgen.<sub>.workers.dev/）
        # 不需要 --base 前缀，与 GitHub Pages 的 /mapgen/ 子路径不同
        run: bunx vite build
        working-directory: packages/web

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 使用仓库根目录的 wrangler.toml 配置
          command: deploy

      - name: Output deployment URL
        run: |
          echo "✅ Deployed to Cloudflare Workers"
          echo "🌐 URL: https://mapgen.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          echo "（实际 URL 在首次部署后由 Cloudflare 分配，可在 Dashboard 查看）"
