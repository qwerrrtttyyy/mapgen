name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-pages-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Build web for GitHub Pages
        # --base=/mapgen/ 让 Vite 把所有资源 URL 前缀加上仓库名，
        # 否则 GitHub Pages 子路径下 favicon / style.css / module 脚本都会 404。
        # 详见 ADR-0005 与 Vite 文档 https://vitejs.dev/guide/build.html#public-base-path
        run: cd packages/web && bunx vite build --base=/mapgen/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
